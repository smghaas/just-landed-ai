<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Landed AI — Intern Housing Search</title>
    <meta name="description" content="AI-powered housing search for interns moving to a new city. Tell us your preferences, and we'll find and rank the best sublets from multiple sources." />
  </head>
  <body>
    <noscript>
      <div style="max-width:600px;margin:80px auto;font-family:system-ui,sans-serif;padding:0 20px">
        <h1>Just Landed AI</h1>
        <p><strong>Find your summer sublet in minutes, not weeks.</strong></p>
        <h2>How it works</h2>
        <ol>
          <li><strong>Tell us what you need.</strong> Pick your city, set your budget, move-in dates, and must-haves like furnished or in-unit laundry.</li>
          <li><strong>We search everywhere.</strong> The app pulls real listings from the Inter-MBA sublease Google Sheet, Craigslist, Zillow, and RentCast — all at once.</li>
          <li><strong>AI ranks your matches.</strong> Google Gemini reads every listing, checks your commute, and scores each one on how well it fits your needs. You get a shortlist of 3-5 top picks with plain-English explanations.</li>
          <li><strong>Draft a message and reach out.</strong> For any listing you like, the AI writes a personalized outreach message referencing real details from the listing. Edit it, refine it, copy it, send it.</li>
        </ol>
        <p>Built for MBA and university interns who are moving to a new city for 10-12 weeks and don't have time to scroll through hundreds of posts.</p>
        <p style="color:#888;font-size:14px;margin-top:32px">This app requires JavaScript to run. Please enable it in your browser.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
